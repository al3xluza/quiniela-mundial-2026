<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026 — Primera Fase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{ --pitch:#0E2B20; --pitch-2:#143828; --grass:#22A565; --board:#0A1F17; --gold:#F2C14E; --cream:#EFF5F0; --line:rgba(255,255,255,.10); --red:#E0574F; --ok:#3BC47C; }
*{margin:0;padding:0;box-sizing:border-box}
body{ background:var(--pitch); background-image:repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 64px, transparent 64px 128px); color:var(--cream); font-family:'Inter',system-ui,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }
.wrap{max-width:920px;margin:0 auto;padding:0 14px 80px}
header{padding:26px 0 14px;text-align:center}
.kicker{font-family:'Saira Condensed';font-weight:600;letter-spacing:.28em;font-size:12px;color:var(--grass);text-transform:uppercase}
h1{font-family:'Saira Condensed';font-weight:800;font-size:clamp(34px,7vw,52px);line-height:.95;text-transform:uppercase;letter-spacing:.01em;margin:6px 0 2px}
h1 .y{color:var(--gold)}
.sub{font-size:12.5px;color:rgba(239,245,240,.55)}
.statusbar{ display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin:16px 0 6px; }
button{ font-family:'Saira Condensed';font-weight:600;font-size:15px;letter-spacing:.08em;text-transform:uppercase; border:1px solid var(--line);border-radius:8px;background:var(--pitch-2);color:var(--cream); padding:10px 16px;cursor:pointer;transition:transform .08s, background .15s; }
button:hover{background:#1A4633}
button:active{transform:scale(.97)}
button.primary{background:var(--grass);color:#06291A;border-color:transparent}
.note{font-size:12px;color:rgba(239,245,240,.5);text-align:center;min-height:16px;margin-bottom:8px}
.note.err{color:var(--red)}
.note.ok{color:var(--ok)}
.tabs{display:flex;gap:6px;justify-content:center;margin:10px 0 18px;flex-wrap:wrap}
.tab{flex:1;min-width:120px;font-size:13px}
.tab.active{background:var(--gold);color:#3A2C06;border-color:transparent}
/* Estilos En Vivo */
.lv-wrap{padding:0 2px}
.lv-empty{text-align:center;color:rgba(239,245,240,.55);padding:40px 16px;font-size:14px}
.lv-status{text-align:center;font-size:11.5px;color:rgba(239,245,240,.45);margin:4px 0 14px}
.lv-card{background:#1A1A1A;border:1px solid rgba(255,255,255,.12);border-radius:14px;overflow:hidden;margin-bottom:16px}
.lv-scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:20px 16px 16px;background:linear-gradient(180deg,#5A1714 0%,#1A1A1A 120%)}
.lv-tm{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.lv-tm img{width:48px;height:48px;border-radius:50%;box-shadow:0 0 0 2px rgba(255,255,255,.15)}
.lv-tm-name{font-family:'Saira Condensed';font-weight:700;font-size:14px;text-transform:uppercase}
.lv-mid{text-align:center}
.lv-score{font-family:'JetBrains Mono';font-weight:700;font-size:36px;color:#fff}
.lv-clock{color:var(--red);font-family:'Saira Condensed';font-weight:700;font-size:12px;text-transform:uppercase}
.lv-section{border-top:1px solid rgba(255,255,255,.1);padding:14px 16px}
.lv-section h4{color:var(--gold);font-family:'Saira Condensed';font-weight:700;font-size:13px;text-transform:uppercase;margin-bottom:12px}
.lv-event{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0}
.lv-ev-min{font-family:'JetBrains Mono';color:rgba(239,245,240,.5);min-width:34px}
.lv-stat{margin-bottom:12px}
.lv-stat-top{display:flex;justify-content:space-between;font-family:'JetBrains Mono';font-weight:700;font-size:13px}
.lv-stat-lbl{text-align:center;font-size:10.5px;color:rgba(239,245,240,.5);text-transform:uppercase;margin-bottom:4px}
.lv-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.08)}
.lv-bar .a{background:var(--grass);width:50%}
.lv-bar .b{background:var(--gold);width:50%}
.lv-xi{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.lv-xi-p{font-size:12px;padding:3px 0;display:flex;gap:6px}
.flag{width:20px;height:20px;border-radius:50%;object-fit:cover}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Quiniela Mundial <span class="y">2026</span></h1>
  </header>
  <div class="tabs">
    <button class="tab active" data-v="tabla" id="tab-tabla">Posiciones</button>
    <button class="tab" data-v="envivo" id="tab-envivo" style="display:none">En Vivo</button>
  </div>
  <div id="vTabla"></div>
  <div id="vEnvivo" style="display:none"></div>
</div>

<script>
// --- CONFIGURACIÓN Y DATOS (Simplificados) ---
const SHEET_ID = "1rlfScbfGZdte0JxGwA3NmHr_08wFgmLTk-c2SyvlLzA";
const ESPN_PROXY = '/.netlify/functions/espn';
const FLAGS = { 'MEXICO':'mx','USA':'us','CANADA':'ca' /* ... completar resto de banderas ... */ };

// --- FUNCIÓN RENDER EN VIVO (VERSION ROBUSTA Y COMPLETA) ---
function renderEnvivo(sum) {
  const el = document.getElementById('vEnvivo'); if (!el) return;
  const comp = sum?.header?.competitions?.[0];
  if (!comp) { el.innerHTML = `<div class="lv-empty">No hay detalles disponibles.</div>`; return; }

  const home = comp.competitors.find(c => c.homeAway === 'home');
  const away = comp.competitors.find(c => c.homeAway === 'away');
  
  const isFinal = comp.status.type.completed;
  const currentMin = parseInt(comp.status.displayClock?.match(/\d+/) || 0);
  const isBreak = isFinal || (currentMin >= 22 && currentMin <= 28) || (currentMin >= 44 && currentMin <= 46) || (currentMin >= 67 && currentMin <= 73) || (currentMin >= 89);

  let h = `<div class="lv-card">
    <div class="lv-scoreboard">
      <div class="lv-tm"><div>${home.team.displayName}</div></div>
      <div class="lv-mid"><div class="lv-score">${home.score} - ${away.score}</div><div class="lv-clock">${comp.status.displayClock}</div></div>
      <div class="lv-tm"><div>${away.team.displayName}</div></div>
    </div>`;

  // Jugadas Clave
  if (!isBreak && sum.keyEvents?.length > 0) {
    h += `<div class="lv-section"><h4>Jugadas Clave</h4>`;
    sum.keyEvents.forEach(k => {
      h += `<div class="lv-event"><span class="lv-ev-min">${k.clock?.displayValue || ''}</span><span>${k.text || ''}</span></div>`;
    });
    h += `</div>`;
  }

  // Estadísticas (Reporte Oficial)
  if (isBreak && home.statistics?.length > 0) {
    h += `<div class="lv-section"><h4>Reporte Oficial (Min. ${currentMin}')</h4>`;
    const want = [{k:'possessionPct',l:'Posesión'},{k:'totalShots',l:'Tiros'},{k:'wonCorners',l:'Córners'}];
    want.forEach(w => {
      const hs = home.statistics.find(s=>s.name===w.k);
      const as = away.statistics.find(s=>s.name===w.k);
      if(hs && as) h += `<div class="lv-stat"><div class="lv-stat-lbl">${w.l}</div><div class="lv-bar"><span class="a" style="width:${hs.displayValue}%"></span><span class="b" style="width:${100-hs.displayValue}%"></span></div></div>`;
    });
    h += `</div>`;
  }

  // Alineaciones
  if (sum.rosters?.length >= 2) {
    h += `<div class="lv-section"><h4>Alineaciones</h4><div class="lv-xi">`;
    sum.rosters.forEach(r => {
      h += `<div class="lv-xi-col"><h5>${r.team.displayName}</h5>`;
      r.roster.slice(0, 11).forEach(p => h += `<div class="lv-xi-p"><span>${p.athlete.displayName}</span></div>`);
      h += `</div>`;
    });
    h += `</div></div>`;
  }
  
  h += `</div>`;
  el.innerHTML = h;
}

// --- LÓGICA DE DETECCIÓN ---
async function checkEnvivo() {
  const tabBtn = document.getElementById('tab-envivo');
  try {
    const res = await fetch(`${ESPN_PROXY}?type=scoreboard&dates=${new Date().toISOString().slice(0,10).replace(/-/g,'')}`);
    const data = await res.json();
    const ev = data.events?.find(e => e.status.type.state === 'in' || e.status.type.state === 'post');
    
    if (ev) {
      tabBtn.style.display = '';
      const sum = await fetch(`${ESPN_PROXY}?type=summary&event=${ev.id}`).then(r => r.json());
      renderEnvivo(sum);
      
      // Lógica de 10 min post-partido
      if (ev.status.type.state === 'post' && !tabBtn.dataset.timer) {
        tabBtn.dataset.timer = setTimeout(() => { tabBtn.style.display = 'none'; }, 10 * 60 * 1000);
      }
    }
  } catch (e) { console.error(e); }
}

checkEnvivo();
setInterval(checkEnvivo, 60000);
</script>
</body>
</html>
